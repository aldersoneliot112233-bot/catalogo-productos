<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modo == 'crear'} ? 'Nuevo Producto' : 'Editar Producto'">Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar (Usa el mismo código que te di antes) -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i> <span>Mi Catálogo</span></div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/admin/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? 'active'"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a></li>
            <li><a th:href="@{/admin/productos}" class="sidebar-link" th:classappend="${activePage == 'productos'} ? 'active'"><i class="bi bi-bag-fill"></i> <span>Productos</span></a></li>
            <li><a th:href="@{/admin/categorias}" class="sidebar-link" th:classappend="${activePage == 'categorias'} ? 'active'"><i class="bi bi-tags-fill"></i> <span>Categorías</span></a></li>
            <li style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1rem;"></li>
            <li><form th:action="@{/logout}" method="post" style="width: 100%; margin: 0;"><button type="submit" class="sidebar-link" style="background: none; border: none; cursor: pointer; width: 100%; color: #ef4444; text-align: left;"><i class="bi bi-box-arrow-left"></i> <span>Cerrar Sesión</span></button></form></li>
        </ul>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1 class="admin-title" th:text="${modo == 'crear'} ? 'Nuevo Producto' : 'Editar Producto'">Título</h1>
            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary rounded-pill px-4">← Volver</a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4" style="max-width: 700px;">
            <form th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data" th:object="${producto}">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre del Producto</label>
                    <input type="text" class="input-modern" th:field="*{nombre}" required placeholder="Ej: Gaseosa KR">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Descripción (Útil para búsquedas)</label>
                    <textarea class="input-modern" th:field="*{descripcion}" rows="3" placeholder="Describe el producto incluyendo otros nombres comunes, marcas o medidas..."></textarea>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Precio (S/)</label>
                        <input type="number" step="0.01" min="0.01" class="input-modern"
                               th:field="*{precio}" required
                               placeholder="Ej: 3.50">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Stock (Opcional)</label>
                        <input type="number" min="0" class="input-modern"
                               th:field="*{stock}"
                               placeholder="Cantidad disponible (Opcional)">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Categoría</label>
                    <select class="input-modern" th:field="*{categoria}" required>
                        <option value="">Seleccionar categoría...</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}">Categoría</option>
                    </select>
                </div>

                <!-- IMAGEN PRINCIPAL -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Imagen Principal (Catálogo)</label>
                    <input type="file" name="imagenPrincipal" class="input-modern" accept="image/*">
                    <small class="text-muted d-block mt-1" th:if="${modo == 'editar' and producto.imagenUrl != null}">
                        Actual: <img th:src="${producto.imagenUrl}" style="height: 40px; border-radius: 6px; vertical-align: middle;">
                    </small>
                </div>

                <!-- GALERÍA DE IMÁGENES EXTRA -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Imágenes Adicionales (Galería de Detalle)</label>
                    <input type="file" name="imagenesExtra" class="input-modern" accept="image/*" multiple>
                    <small class="text-muted d-block mt-1">Selecciona varias (Ctrl+Click). Solo se verán en "Ver Detalle".</small>

                    <div class="d-flex gap-2 mt-2 flex-wrap" th:if="${modo == 'editar' and !#lists.isEmpty(producto.imagenesAdicionales)}">
                        <div th:each="img : ${producto.imagenesAdicionales}" class="position-relative">
                            <img th:src="${img.url}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0;">
                        </div>
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{activo}" id="activoCheck">
                    <label class="form-check-label" for="activoCheck">Producto activo (visible en catálogo público)</label>
                </div>

                <button type="submit" class="btn-magic w-100 justify-content-center">
                    <i class="bi bi-save"></i> <span th:text="${modo == 'crear'} ? 'Crear Producto' : 'Guardar Cambios'">Guardar</span>
                </button>
            </form>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
