<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-box-seam-fill"></i>
            <span>Mi Catálogo</span>
        </div>

        <ul class="sidebar-menu">
            <!-- Dashboard -->
            <li>
                <a th:href="@{/admin/dashboard}"
                   class="sidebar-link"
                   th:classappend="${activePage == 'dashboard'} ? 'active'">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <!-- Productos -->
            <li>
                <a th:href="@{/admin/productos}"
                   class="sidebar-link"
                   th:classappend="${activePage == 'productos'} ? 'active'">
                    <i class="bi bi-bag-fill"></i>
                    <span>Productos</span>
                </a>
            </li>

            <!-- Categorías -->
            <li>
                <a th:href="@{/admin/categorias}"
                   class="sidebar-link"
                   th:classappend="${activePage == 'categorias'} ? 'active'">
                    <i class="bi bi-tags-fill"></i>
                    <span>Categorías</span>
                </a>
            </li>

            <!-- Separador Visual -->
            <li style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1rem;"></li>

            <!-- Cerrar Sesión -->
            <li>
                <form th:action="@{/logout}" method="post" style="width: 100%; margin: 0;">
                    <button type="submit" class="sidebar-link"
                            style="background: none; border: none; cursor: pointer; width: 100%; color: #ef4444; text-align: left;">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Cerrar Sesión</span>
                    </button>
                </form>
            </li>
        </ul>
    </aside>
    <main class="admin-main">
        <div class="admin-header">
            <h1 class="admin-title">Gestión de Categorías</h1>
            <button class="btn-magic text-decoration-none py-2 px-4" data-bs-toggle="modal" data-bs-target="#modalCategoria">
                <i class="bi bi-plus-lg"></i> Nueva Categoría
            </button>
        </div>

        <!-- Lista Real de Categorías desde BD -->
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="cat : ${categorias}">
                <div class="stat-card d-flex justify-content-between align-items-center h-100">
                    <div>
                        <h5 class="fw-bold mb-1" th:text="${cat.nombre}">Nombre Categoría</h5>
                        <p class="text-muted small mb-0" th:text="${cat.descripcion} ?: 'Sin descripción'">Descripción</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/admin/categorias/eliminar/{id}(id=${cat.id})}"
                           class="btn-action-sm btn-delete"
                           onclick="return confirm('¿Eliminar esta categoría? Se eliminarán también sus productos.')">
                            <i class="bi bi-trash3"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Mensaje si no hay categorías -->
            <div th:if="${#lists.isEmpty(categorias)}" class="col-12 text-center py-5">
                <p class="text-muted fs-5">No hay categorías registradas</p>
                <button class="btn-magic text-decoration-none mt-2" data-bs-toggle="modal" data-bs-target="#modalCategoria">
                    Crear primera categoría
                </button>
            </div>
        </div>

        <!-- Modal para Crear Categoría -->
        <div class="modal fade" id="modalCategoria" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 rounded-4 p-3">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold">Nueva Categoría</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <!-- Formulario que envía a /admin/categorias/guardar -->
                        <form th:action="@{/admin/categorias/guardar}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Nombre</label>
                                <input type="text" name="nombre" class="input-modern" required placeholder="Ej: Libreria">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Descripción</label>
                                <textarea name="descripcion" class="input-modern" rows="3" placeholder="Breve descripción..."></textarea>
                            </div>
                            <button type="submit" class="btn-magic w-100 justify-content-center mt-2">Guardar Categoría</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
