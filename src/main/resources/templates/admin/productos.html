<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-box-seam-fill"></i>
            <span>Mi Catálogo</span>
        </div>

        <ul class="sidebar-menu">
            <!-- Dashboard -->
            <li>
                <a th:href="@{/admin/dashboard}"
                   class="sidebar-link"
                   th:classappend="${activePage == 'dashboard'} ? 'active'">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <!-- Productos -->
            <li>
                <a th:href="@{/admin/productos}"
                   class="sidebar-link"
                   th:classappend="${activePage == 'productos'} ? 'active'">
                    <i class="bi bi-bag-fill"></i>
                    <span>Productos</span>
                </a>
            </li>

            <!-- Categorías -->
            <li>
                <a th:href="@{/admin/categorias}"
                   class="sidebar-link"
                   th:classappend="${activePage == 'categorias'} ? 'active'">
                    <i class="bi bi-tags-fill"></i>
                    <span>Categorías</span>
                </a>
            </li>

            <!-- Separador Visual -->
            <li style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1rem;"></li>

            <!-- Cerrar Sesión -->
            <li>
                <form th:action="@{/logout}" method="post" style="width: 100%; margin: 0;">
                    <button type="submit" class="sidebar-link"
                            style="background: none; border: none; cursor: pointer; width: 100%; color: #ef4444; text-align: left;">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Cerrar Sesión</span>
                    </button>
                </form>
            </li>
        </ul>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1 class="admin-title">Gestión de Productos</h1>
            <!-- En admin/productos.html, busca el botón de agregar y cámbialo por esto -->
            <a th:href="@{/admin/productos/nuevo}" class="btn-magic text-decoration-none py-2 px-4">
                <i class="bi bi-plus-lg"></i> Agregar Nuevo
            </a>
        </div>

        <!-- Tabla Moderna -->
        <div class="table-responsive">
            <table class="table-modern">
                <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prod : ${productos}">
                    <td><img th:src="${prod.imagenUrl}" class="img-thumb" alt="Producto"></td>
                    <td class="fw-bold" th:text="${prod.nombre}">Nombre</td>
                    <!-- DESPUÉS (BIEN) -->
                    <td>
    <span class="badge bg-light text-dark border"
          th:text="${prod.categoria.nombre}">Categoría</span>
                    </td>
                    <td class="fw-bold text-primary" th:text="'S/ ' + ${#numbers.formatDecimal(prod.precio, 1, 2)}">S/ 0.00</td>
                    <td th:classappend="${prod.stock < 10} ? 'text-danger fw-bold'" th:text="${prod.stock}">0</td>
                    <td>
            <span class="badge-status"
                  th:classappend="${prod.activo} ? 'badge-active' : 'badge-inactive'"
                  th:text="${prod.activo} ? 'Activo' : 'Inactivo'">Estado</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/productos/editar/{id}(id=${prod.id})}" class="btn-action-sm btn-edit">
                            <i class="bi bi-pencil-square"></i> Editar
                        </a>
                        <a th:href="@{/admin/productos/eliminar/{id}(id=${prod.id})}"
                           class="btn-action-sm btn-delete"
                           onclick="return confirm('¿Eliminar este producto?')">
                            <i class="bi bi-trash3"></i> Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
