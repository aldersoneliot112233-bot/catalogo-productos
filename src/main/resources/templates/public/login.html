<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>
<div class="login-screen">
    <div class="login-box">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill fs-1 text-primary mb-2 d-block"></i>
            <h2 class="login-title fw-bold">Acceso al Catálogo</h2>
            <p class="login-subtitle">Ingresa tus credenciales para gestionar productos</p>
        </div>

        <!-- Mensajes de error/éxito de Spring Security -->
        <div th:if="${param.error}" class="alert alert-danger py-2 small bg-opacity-10 border-0 text-center">
            <i class="bi bi-exclamation-circle-fill me-1"></i> Usuario o contraseña incorrectos
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small bg-opacity-10 border-0 text-center">
            <i class="bi bi-check-circle-fill me-1"></i> Sesión cerrada correctamente
        </div>

        <!-- Formulario que Spring Security intercepta automáticamente -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase">Usuario</label>
                <input type="text" name="username" class="input-modern" required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small text-uppercase">Contraseña</label>
                <input type="password" name="password" class="input-modern" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-magic w-100 justify-content-center">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/}" class="text-decoration-none text-muted small hover-primary">
                ← Volver al inicio
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
